name: campusconnect
description: CampusConnect — Context-Aware Campus Services Platform (Group 5, CAM-PHX-05)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.9
  firebase_messaging: ^14.7.19
  firebase_storage: ^11.6.9

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Biometric Auth
  local_auth: ^2.2.0

  # Maps & Location
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_sign_in: ^6.2.1

  # HTTP & Networking
  http: ^1.2.1
  web_socket_channel: ^2.4.4
  connectivity_plus: ^5.0.2
  retry: ^3.1.2

  # Notifications
  flutter_local_notifications: ^17.1.2

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0

  # UI & Utilities
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  image_picker: ^1.0.7
  flutter_image_compress: ^2.2.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  permission_handler: ^11.3.1
  uuid: ^4.3.3
  crypto: ^3.0.3
  jwt_decoder: ^2.0.1
  flutter_secure_storage: ^9.0.0

  # BLE (Attendance Tracker — future milestone)
  flutter_blue_plus: ^1.31.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/data/config.json
    - assets/data/seed_database.json
